[package]
name = "openmls_compat_tests"
version = "0.1.0"
edition = "2021"
publish = false

[features]
# enable `openmls` versions
compat_0_7_0 = ["dep:openmls_0_7_0"]
compat_0_8_1 = ["dep:openmls_0_8_1", "openmls/0-8-1-storage-format"]
compat_0_8_1_extensions = [
    "compat_0_8_1",
    "openmls_0_8_1/extensions-draft-08",
    "extensions-draft-08"
]

# enable features on the underlying `openmls` crate,
# and on the StorageProvider implementation in `test_storage_provider`
extensions-draft-08 = [
    "openmls/extensions-draft-08"
]
virtual-clients-draft = [
    "openmls/virtual-clients-draft"
]

# enable features required for `test_optional_field_stability` test
optional_field_stability = [
    "compat_0_7_0",
    "openmls_traits_0_4_1",
    "openmls/compat",
]

[dependencies]
serde = { version = "^1.0" }
postcard = { version = "1", features = ["alloc"] }
thiserror = { version = "^2.0" }
openmls_0_7_0 = { package = "openmls", version = "=0.7.0", optional = true }
openmls_traits_0_4_1 = { package = "openmls_traits", version = "=0.4.1", optional = true }
openmls_0_8_1 = { package = "openmls", version = "=0.8.1", optional = true }
openmls = { path = "../openmls" }
openmls_traits = { path = "../traits" }

[dev-dependencies]
serde_json = "1.0"

# XXX: workaround for incompatible dependencies between
# `main` and `openmls=0.8.1` when the `extensions-draft-08`
# feature is enabled
[patch.crates-io]
openmls_libcrux_crypto = { path = "../libcrux_crypto" }
openmls_sqlite_storage = { path = "../sqlite_storage" }
